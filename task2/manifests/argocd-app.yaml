apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ledger-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/mohammadthekingslayer/dodo-payments-assessment.git'
    path: task1/manifests
    targetRevision: main
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: payments
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
